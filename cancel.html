<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canceled – CocoaJoy</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cancel-page {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
        }
        .cancel-card {
            background: #fff;
            padding: 60px 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            max-width: 500px;
            width: 100%;
        }
        .cancel-icon {
            font-size: 4rem;
            margin-bottom: 24px;
            display: block;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--text-muted);
            margin-bottom: 16px;
        }
        p {
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="contact-bar" role="region" aria-label="Contact CocoaJoy">
        <div class="container contact-bar-inner">
            <span>Contact us:</span>
            <a href="mailto:openrize@gmail.com">openrize@gmail.com</a>
            <span class="contact-bar-sep" aria-hidden="true">·</span>
            <a href="tel:+12243779143">+1 (224) 377 9143</a>
        </div>
    </div>
    <div class="cancel-page">
        <div class="cancel-card">
            <span class="cancel-icon">🍫</span>
            <h1>That link is no longer used</h1>
            <p>Online checkout has been removed in favor of a portfolio site. Use the contact details in the bar above, or go to the portfolio to explore our work.</p>
            <div style="display:flex; gap:16px; justify-content:center; flex-wrap:wrap">
                <a href="contact.html" class="btn btn-primary">Contact us</a>
                <a href="shop.html" class="btn btn-outline">View portfolio</a>
            </div>
        </div>
    </div>
</body>
</html>
