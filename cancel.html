<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Canceled – CocoaJoy</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cancel-page {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
        }
        .cancel-card {
            background: #fff;
            padding: 60px 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            max-width: 500px;
            width: 100%;
        }
        .cancel-icon {
            font-size: 4rem;
            margin-bottom: 24px;
            display: block;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--text-muted);
            margin-bottom: 16px;
        }
        p {
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="cancel-page">
        <div class="cancel-card">
            <span class="cancel-icon">🛒</span>
            <h1>Payment Canceled</h1>
            <p>Your payment was not completed. No worries—your cart is still saved if you'd like to try again later.</p>
            <div style="display:flex; gap:16px; justify-content:center">
                <a href="checkout.html" class="btn btn-primary">Return to Checkout</a>
                <a href="shop.html" class="btn btn-outline">Back to Shop</a>
            </div>
        </div>
    </div>
</body>
</html>
