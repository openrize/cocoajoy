<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Successful – CocoaJoy</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .success-page {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
        }
        .success-card {
            background: #fff;
            padding: 60px 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            max-width: 500px;
            width: 100%;
        }
        .success-icon {
            font-size: 4rem;
            margin-bottom: 24px;
            display: block;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--choc-rich);
            margin-bottom: 16px;
        }
        p {
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="success-page">
        <div class="success-card">
            <span class="success-icon">🎉</span>
            <h1>Sweet Success!</h1>
            <p>Thank you for your order. We've received your payment and are preparing your chocolates with love. You'll receive a confirmation email shortly.</p>
            <a href="index.html" class="btn btn-primary">Continue Shopping</a>
        </div>
    </div>

    <script>
        // Clear the cart on successful payment
        localStorage.removeItem('cocoajoy_cart');
    </script>
</body>
</html>
